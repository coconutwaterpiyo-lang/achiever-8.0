<script>
// ... (keep loadData, updateBreadcrumb, and backBtn.onclick as they are)

function getFolderAction(folder) {
    const hasChildren = folder.children && folder.children.length > 0;
    const hasLinks = folder.links && folder.links.length > 0;
    
    // Requirement: If exactly one link and no children, return the URL
    if (!hasChildren && folder.links && folder.links.length === 1) {
        return { type: 'link', url: folder.links[0].url };
    }
    
    // Otherwise, normal navigation
    if (hasChildren || hasLinks) {
        return { type: 'folder' };
    }
    
    return { type: 'none' };
}

function handleFolderClick(folder) {
    const action = getFolderAction(folder);
    
    if (action.type === 'link') {
        window.open(action.url, '_blank');
    } else if (action.type === 'folder') {
        path.push(folder);
        currentFolder = folder;
        renderContent(folder.children || [], folder.links || []);
        updateBreadcrumb();
    }
}

function renderFolders(folders) {
    const container = document.getElementById("folders");
    container.innerHTML = "";

    folders.forEach(folder => {
        const div = document.createElement("div");
        div.className = "folder";
        div.innerHTML = `<div class="folder-name">📁 ${folder.name}</div><div class="arrow">➜</div>`;
        div.onclick = () => handleFolderClick(folder);
        container.appendChild(div);
    });

    document.getElementById("backBtn").style.display = path.length ? "block" : "none";
}

function renderContent(folders, links) {
    const container = document.getElementById("folders");
    container.innerHTML = "";

    folders.forEach(folder => {
        const div = document.createElement("div");
        div.className = "folder";
        div.innerHTML = `<div class="folder-name">📁 ${folder.name}</div><div class="arrow">➜</div>`;
        div.onclick = () => handleFolderClick(folder);
        container.appendChild(div);
    });

    // ... (keep the rest of renderContent links rendering logic)
}
</script>
