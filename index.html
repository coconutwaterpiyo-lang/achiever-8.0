<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACHIEVER 8.0 — By Rani Mam</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #2563eb;
      --pink: #ec4899;
      --green-wa: #25d366;
      --text: #1e293b;
      --text-muted: #64748b;
      --bg: #eef5ff;
      --card-bg: #ffffff;
      --radius: 18px;
      --shadow: 0 2px 16px rgba(37,99,235,.10);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(160deg, #ddeeff 0%, #f0e8ff 50%, #ffe8f4 100%);
      background-attachment: fixed;
      min-height: 100vh;
      color: var(--text);
      padding-bottom: 100px;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      padding: 32px 20px 20px;
      position: relative;
    }

    .logo {
      font-size: clamp(2.4rem, 10vw, 3.8rem);
      font-weight: 900;
      letter-spacing: -1px;
      line-height: 1;
    }
    .logo-main { color: var(--blue); }
    .logo-ver  { color: var(--pink); }

    .subtitle {
      margin-top: 8px;
      font-size: clamp(.7rem, 3vw, .85rem);
      font-weight: 700;
      letter-spacing: .2em;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .subtitle b { color: var(--pink); }

    /* ── SEARCH ── */
    .search-wrap {
      max-width: 680px;
      margin: 20px auto 10px;
      padding: 0 16px;
    }
    .search-box {
      position: relative;
      display: flex;
      align-items: center;
    }
    .search-icon {
      position: absolute;
      left: 16px;
      font-size: 1.1rem;
      color: var(--text-muted);
      pointer-events: none;
    }
    #searchInput {
      width: 100%;
      padding: 14px 16px 14px 46px;
      border: none;
      border-radius: 50px;
      font-size: .95rem;
      background: white;
      color: var(--text);
      outline: none;
      box-shadow: 0 2px 16px rgba(0,0,0,.10);
    }
    #searchInput::placeholder { color: #aab; }
    .clear-btn {
      position: absolute; right: 16px; background: none; border: none;
      cursor: pointer; color: var(--text-muted); font-size: 1rem; display: none;
    }

    /* ── SECTION LABEL ── */
    .section-label {
      max-width: 680px;
      margin: 22px auto 10px;
      padding: 0 16px;
      font-size: .8rem;
      font-weight: 800;
      letter-spacing: .14em;
      color: var(--blue);
      text-transform: uppercase;
    }

    /* ── MAIN ── */
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 12px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── LECTURE CARD ── */
    .lec-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 18px 16px 16px;
      box-shadow: var(--shadow);
      animation: fadeUp .35s ease both;
    }
    .lec-title {
      font-size: .97rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: .03em;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1.5px solid #eef0f5;
    }
    .btn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
    }

    /* ── COLORED BUTTONS ── */
    .lec-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 12px 10px;
      border-radius: 10px;
      font-size: .82rem;
      font-weight: 800;
      letter-spacing: .06em;
      text-decoration: none;
      color: white;
      cursor: pointer;
      border: none;
      transition: opacity .18s, transform .18s;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .lec-btn:hover { opacity: .88; transform: scale(.97); }
    .lec-btn:active { transform: scale(.93); }

    .btn-video   { background: linear-gradient(135deg, #1d6ef5, #2563eb); }
    .btn-eng     { background: linear-gradient(135deg, #5b4be8, #7c3aed); }
    .btn-hindi   { background: linear-gradient(135deg, #9333ea, #7c3aed); }
    .btn-quiz    { background: linear-gradient(135deg, #f43f8e, #ec4899); }
    .btn-pdf     { background: linear-gradient(135deg, #06b6d4, #0891b2); }
    .btn-extra   { background: linear-gradient(135deg, #f59e0b, #d97706); }

    /* full-width button (odd last child) */
    .lec-btn.full { grid-column: 1 / -1; }

    /* ── EMPTY / ERROR ── */
    .msg-box {
      text-align: center; padding: 40px 20px; background: white;
      border-radius: var(--radius); color: var(--text-muted); font-size: .9rem; font-weight: 600;
    }
    .msg-box.error { background: #fff5f5; color: #dc2626; }

    /* ── NO RESULTS ── */
    #noResults { display: none; }

    /* ── WHATSAPP ── */
    .wa-btn {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--green-wa);
      color: white;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      font-weight: 800;
      font-size: .88rem;
      letter-spacing: .04em;
      box-shadow: 0 -2px 16px rgba(37,211,102,.3);
      z-index: 1000;
    }
    .wa-left { display: flex; align-items: center; gap: 12px; }
    .wa-icon-wrap {
      width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,.25);
      display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
    }
    .wa-text-top { font-size: .72rem; font-weight: 700; letter-spacing: .08em; opacity: .9; }
    .wa-text-bot { font-size: .95rem; font-weight: 900; }
    .wa-arrow { font-size: 1.3rem; font-weight: 900; }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 380px) {
      .lec-btn { font-size: .74rem; padding: 10px 6px; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <span class="logo-main">ACHIEVER</span> <span class="logo-ver">8.0</span>
    </div>
    <div class="subtitle">BY <b>RANI MAM</b> • ENGLISH COMPLETE</div>
  </header>

  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search subject…" autocomplete="off" />
      <button class="clear-btn" id="clearBtn">✕</button>
    </div>
  </div>

  <div class="section-label" id="secLabel">LECTURES &amp; NOTES</div>

  <main id="lectureList"></main>
  <div id="noResults" class="msg-box" style="max-width:680px;margin:12px auto;">🔍 Koi result nahi mila.</div>

  <a class="wa-btn" href="https://whatsapp.com/channel/0029Vb7n2ZBGE56cha5K7K3Z" target="_blank" rel="noopener">
    <div class="wa-left">
      <div class="wa-icon-wrap">💬</div>
      <div>
        <div class="wa-text-top">JOIN WHATSAPP</div>
        <div class="wa-text-bot">For More Free Batches</div>
      </div>
    </div>
    <div class="wa-arrow">→</div>
  </a>

  <script>
  /* ================================================================
     ✏️  APNA DATA YAHAN EDIT KAREIN
     
     Har lecture mein "buttons" add karein:
       type: "video" | "eng" | "hindi" | "quiz" | "pdf" | "extra"
       label: button par jo text dikhega
       url: link (http/https auto-add hoga)
     
     Ek lecture mein jitne chahein utne buttons add kar sakte hain.
     Odd button automatically full-width ho jata hai.
  ================================================================ */
  const DATA = [
    {
      title: "Grammar - Lec 1",
      buttons: [
        { type: "video",  label: "▶ Video",       url: "www.google.com" },
        { type: "eng",    label: "📄 Eng Notes",   url: "www.google.com" },
        { type: "hindi",  label: "📘 Hindi Notes", url: "www.google.com" },
        { type: "quiz",   label: "❓ Quiz",         url: "www.google.com" },
        { type: "pdf",    label: "📝 PPT/PDF",      url: "www.google.com" }
      ]
    },
    {
      title: "Grammar - Lec 2",
      buttons: [
        { type: "video",  label: "▶ Video",       url: "www.google.com" },
        { type: "eng",    label: "📄 Eng Notes",   url: "www.google.com" },
        { type: "hindi",  label: "📘 Hindi Notes", url: "www.google.com" },
        { type: "quiz",   label: "❓ Quiz",         url: "www.google.com" }
      ]
    }
  ];
  /* ================================================================ */

  function safeUrl(url) {
    if (!url) return '#';
    url = url.trim();
    if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'https://' + url;
    return url;
  }

  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  const typeClass = {
    video: 'btn-video', eng: 'btn-eng', hindi: 'btn-hindi',
    quiz: 'btn-quiz', pdf: 'btn-pdf', extra: 'btn-extra'
  };

  function renderCards(list) {
    const container = document.getElementById('lectureList');
    container.innerHTML = '';
    if (!list.length) {
      document.getElementById('noResults').style.display = 'block';
      return;
    }
    document.getElementById('noResults').style.display = 'none';

    list.forEach((lec, i) => {
      const card = document.createElement('div');
      card.className = 'lec-card';
      card.style.animationDelay = (i * 0.06) + 's';

      const title = document.createElement('div');
      title.className = 'lec-title';
      title.textContent = lec.title;
      card.appendChild(title);

      const grid = document.createElement('div');
      grid.className = 'btn-grid';

      const btns = lec.buttons || [];
      btns.forEach((btn, bi) => {
        const a = document.createElement('a');
        a.className = 'lec-btn ' + (typeClass[btn.type] || 'btn-extra');
        a.href = safeUrl(btn.url);
        a.target = '_blank';
        a.rel = 'noopener';
        a.textContent = btn.label;
        // Odd last item → full width
        if (btns.length % 2 !== 0 && bi === btns.length - 1) {
          a.classList.add('full');
        }
        grid.appendChild(a);
      });

      card.appendChild(grid);
      container.appendChild(card);
    });
  }

  // Search
  const searchInput = document.getElementById('searchInput');
  const clearBtn    = document.getElementById('clearBtn');

  searchInput.addEventListener('input', function() {
    const q = this.value.trim().toLowerCase();
    clearBtn.style.display = q ? 'block' : 'none';
    const label = document.getElementById('secLabel');
    if (!q) {
      label.textContent = 'LECTURES & NOTES';
      renderCards(DATA);
    } else {
      label.textContent = 'SEARCH RESULTS';
      const filtered = DATA.filter(lec =>
        lec.title.toLowerCase().includes(q) ||
        (lec.buttons || []).some(b => b.label.toLowerCase().includes(q))
      );
      renderCards(filtered);
    }
  });

  clearBtn.addEventListener('click', function() {
    searchInput.value = '';
    this.style.display = 'none';
    document.getElementById('secLabel').textContent = 'LECTURES & NOTES';
    renderCards(DATA);
    searchInput.focus();
  });

  // Init
  renderCards(DATA);
  </script>
</body>
</html>
