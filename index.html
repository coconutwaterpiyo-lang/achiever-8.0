<script>
// Set the theme attribute as early as possible (before CSS paints) so
// dark-mode users don't see a flash of the light theme on load.
(function () {
  try {
    var saved = localStorage.getItem("doraemon_theme");
    var theme = (saved === "dark" || saved === "light")
      ? saved
      : (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    document.documentElement.setAttribute("data-theme", theme);
  } catch (e) { /* localStorage unavailable — fall back to default light theme */ }
})();
</script>
<style>
:root{
  --blue:#2563eb;
  --pink:#ec4899;
  --green:#25D366;
  --text-dark:#1e1e1e;
  --text-secondary:#666;
  --text-muted:#888;
  --text-faint:#aaa;
  --surface:#ffffff;
  --surface-alt:#f1f3f7;
  --bg-grad-start:#eef5ff;
  --bg-grad-end:#fff0f8;
  --badge-bg:#eef2ff;
  --border:#eef0f5;
  --radius-lg:24px;
  --radius-md:18px;
  --shadow-soft:0 4px 12px rgba(0,0,0,.08);
  --shadow-hover:0 10px 22px rgba(0,0,0,.13);
}
html[data-theme="dark"]{
  --text-dark:#f1f3f9;
  --text-secondary:#b7bcc7;
  --text-muted:#8c92a3;
  --text-faint:#6b7180;
  --surface:#1c1f2b;
  --surface-alt:#262b3a;
  --bg-grad-start:#0f1117;
  --bg-grad-end:#181420;
  --badge-bg:#222a45;
  --border:#2c3142;
  --shadow-soft:0 4px 14px rgba(0,0,0,.45);
  --shadow-hover:0 10px 26px rgba(0,0,0,.55);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{max-width:100%;overflow-x:hidden;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:linear-gradient(135deg,var(--bg-grad-start),var(--bg-grad-end));
  min-height:100vh;
  padding:20px 16px 100px;
  color:var(--text-dark);
  width:100%;
  transition:background .25s ease, color .25s ease;
}
.container{max-width:560px;margin:0 auto;width:100%;}

/* ── HEADER ── */
.header{text-align:center;margin:28px 0 22px;animation:fadeInDown .5s ease both;}
.logo{font-size:38px;font-weight:900;color:var(--blue);letter-spacing:-.5px;}
.logo span{color:var(--pink);}
.subtitle{margin-top:8px;font-size:13px;font-weight:700;letter-spacing:2.5px;color:var(--blue);opacity:.85;}

/* ── AVATAR (header + popup share the same gradient-ring treatment) ── */
.avatar-ring{
  width:84px;height:84px;
  border-radius:50%;
  margin:0 auto 12px;
  padding:3px;
  background:linear-gradient(135deg,var(--blue),var(--pink));
  display:flex;align-items:center;justify-content:center;
}
.avatar-ring.modal-avatar-ring{width:92px;height:92px;margin:0 auto 14px;}
.avatar-img{
  width:100%;height:100%;
  border-radius:50%;
  object-fit:cover;
  display:block;
  border:3px solid #fff;
}

/* ── CONTACT ADMIN BUTTON ── */
.contact-admin-btn{
  display:inline-flex;
  align-items:center;
  gap:6px;
  margin-top:14px;
  padding:10px 18px;
  border-radius:999px;
  background:var(--surface);
  color:var(--blue);
  font-size:13px;
  font-weight:800;
  letter-spacing:.02em;
  text-decoration:none;
  box-shadow:var(--shadow-soft);
  transition:transform .15s ease, box-shadow .15s ease;
}
.contact-admin-btn:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover);}
.contact-admin-btn:active{transform:translateY(0) scale(.97);}

/* ── SEARCH ── */
.search-wrap{position:relative;margin-bottom:18px;}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:15px;opacity:.6;}
.search-input{
  width:100%;
  padding:14px 40px 14px 42px;
  border:none;
  border-radius:16px;
  background:var(--surface);
  box-shadow:var(--shadow-soft);
  font-size:15px;
  font-weight:500;
  color:var(--text-dark);
}
.search-input::placeholder{color:var(--text-faint);font-weight:500;}
.search-clear-btn{
  display:none;
  position:absolute;
  right:10px;top:50%;
  transform:translateY(-50%);
  width:26px;height:26px;
  align-items:center;justify-content:center;
  border:none;
  border-radius:50%;
  background:var(--surface-alt);
  color:var(--text-muted);
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  padding:0;
}
.search-clear-btn:hover{color:var(--text-dark);}
.search-clear-btn:active{transform:translateY(-50%) scale(.92);}

/* ── NAV / BREADCRUMB ── */
.nav-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
#breadcrumb{font-size:13px;font-weight:700;color:var(--text-secondary);letter-spacing:.2px;}
.back-btn{
  display:none;
  align-items:center;
  gap:6px;
  background:var(--blue);
  color:#fff;
  border:none;
  padding:9px 14px;
  border-radius:12px;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  transition:transform .15s ease, box-shadow .15s ease;
}
.back-btn:hover{transform:translateY(-1px);box-shadow:0 4px 10px rgba(37,99,235,.3);}
.back-btn:active{transform:translateY(0) scale(.97);}

/* ── SORT TOGGLE (deep folder levels only) ── */
.sort-toggle-row{display:flex;justify-content:flex-start;margin-bottom:12px;}
.sort-toggle-btn{
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:var(--surface);
  color:var(--blue);
  border:none;
  padding:8px 14px;
  border-radius:999px;
  font-size:12px;
  font-weight:800;
  letter-spacing:.02em;
  cursor:pointer;
  box-shadow:var(--shadow-soft);
  transition:transform .15s ease, box-shadow .15s ease;
}
.sort-toggle-btn:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover);}
.sort-toggle-btn:active{transform:translateY(0) scale(.97);}
.sort-toggle-icon{font-size:13px;}

/* ── FOLDER CARD ── */
.folder{
  background:var(--surface);
  border-radius:var(--radius-lg);
  padding:20px 22px;
  margin-bottom:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  box-shadow:var(--shadow-soft);
  cursor:pointer;
  transition:transform .15s ease, box-shadow .15s ease;
}
.folder:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover);}
.folder:active{transform:translateY(-1px) scale(.99);}
.folder-main{display:flex;flex-direction:column;gap:4px;min-width:0;flex:1 1 auto;}
.folder-name{font-size:17px;font-weight:700;color:var(--text-dark);overflow-wrap:break-word;word-break:break-word;}
.crumb-sub{font-size:12px;color:var(--text-muted);font-weight:500;overflow-wrap:break-word;word-break:break-word;}
.folder-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.count-badge{
  background:var(--badge-bg);
  color:var(--blue);
  font-size:12px;
  font-weight:700;
  padding:4px 9px;
  border-radius:999px;
}
.link-badge{
  background:rgba(37,211,102,.15);
  color:#16a34a;
  font-size:11px;
  font-weight:800;
  padding:4px 10px;
  border-radius:999px;
  white-space:nowrap;
  letter-spacing:.02em;
}
.arrow{font-size:22px;color:var(--blue);}

/* ── LECTURE CARD (leaf folder: name + its buttons shown inline, no click needed) ── */
.lecture-card{
  background:var(--surface);
  border-radius:var(--radius-lg);
  padding:18px 20px;
  margin-bottom:14px;
  box-shadow:var(--shadow-soft);
}
.lecture-title{
  font-size:16px;
  font-weight:700;
  color:var(--text-dark);
  margin-bottom:12px;
  padding-bottom:10px;
  border-bottom:1.5px solid var(--border);
  overflow-wrap:break-word;
  word-break:break-word;
}

/* ── BUTTON GRID (colorful, type-aware) ── */
.links-label{font-size:12px;font-weight:800;letter-spacing:1.5px;color:var(--text-muted);margin:18px 0 10px;text-transform:uppercase;}
.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px;}
.lec-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  padding:13px 10px;
  border-radius:12px;
  font-size:13px;
  font-weight:800;
  letter-spacing:.03em;
  text-decoration:none;
  color:#fff;
  cursor:pointer;
  border:none;
  transition:transform .15s ease, opacity .15s ease, box-shadow .15s ease;
  text-transform:uppercase;
  box-shadow:var(--shadow-soft);
  min-width:0;
  overflow-wrap:break-word;
  word-break:break-word;
  text-align:center;
}
.lec-btn:hover{transform:translateY(-2px);opacity:.92;}
.lec-btn:active{transform:scale(.96);}
.lec-btn.full{grid-column:1 / -1;}
.btn-icon{font-size:15px;flex-shrink:0;}

.btn-video{background:linear-gradient(135deg,#1d6ef5,#2563eb);}
.btn-eng  {background:linear-gradient(135deg,#5b4be8,#7c3aed);}
.btn-hindi{background:linear-gradient(135deg,#9333ea,#7c3aed);}
.btn-quiz {background:linear-gradient(135deg,#f43f8e,#ec4899);}
.btn-pdf  {background:linear-gradient(135deg,#06b6d4,#0891b2);}
.btn-extra{background:linear-gradient(135deg,#f59e0b,#d97706);}

/* Search-result button cards: full-width, with breadcrumb subtext */
.lec-btn.with-sub{
  justify-content:flex-start;
  text-align:left;
  text-transform:none;
  padding:14px 16px;
  grid-column:1 / -1;
}
.btn-text{display:flex;flex-direction:column;gap:2px;min-width:0;}
.btn-label{font-size:14px;font-weight:800;letter-spacing:.02em;}
.btn-sub{font-size:11px;font-weight:600;opacity:.85;text-transform:none;letter-spacing:0;}

/* ── EMPTY / ERROR ── */
.empty-state,.error-state{
  text-align:center;
  padding:36px 24px;
  background:var(--surface);
  border-radius:var(--radius-md);
  box-shadow:0 4px 12px rgba(0,0,0,.06);
}
.state-icon{font-size:34px;margin-bottom:10px;line-height:1;}
.state-title{font-size:15px;font-weight:800;color:var(--text-dark);margin-bottom:4px;}
.state-sub{font-size:12.5px;font-weight:600;color:var(--text-muted);line-height:1.5;}
.error-state .state-title{color:var(--pink);}
.state-retry-btn{
  margin-top:16px;
  display:inline-flex;
  align-items:center;
  padding:10px 22px;
  border-radius:999px;
  border:none;
  background:var(--blue);
  color:#fff;
  font-weight:800;
  font-size:13px;
  cursor:pointer;
  box-shadow:var(--shadow-soft);
  transition:transform .15s ease, box-shadow .15s ease;
}
.state-retry-btn:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover);}
.state-retry-btn:active{transform:translateY(0) scale(.96);}

/* ── SKELETON LOADER (shown while data.json/shell.json/a chunk is loading) ── */
.skeleton-card{
  height:64px;
  border-radius:var(--radius-lg);
  margin-bottom:14px;
  background:linear-gradient(90deg, var(--surface) 25%, var(--surface-alt) 50%, var(--surface) 75%);
  background-size:200% 100%;
  animation:skeletonShimmer 1.3s ease-in-out infinite;
}
@keyframes skeletonShimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

/* ── THEME TOGGLE ── */
.theme-toggle-btn{
  position:fixed;
  top:16px;right:16px;
  width:42px;height:42px;
  border-radius:50%;
  border:none;
  background:var(--surface);
  color:var(--text-dark);
  font-size:18px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow-soft);
  cursor:pointer;
  z-index:500;
  transition:transform .15s ease, box-shadow .15s ease;
}
.theme-toggle-btn:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover);}
.theme-toggle-btn:active{transform:translateY(0) scale(.93);}

/* ── WHATSAPP ── */
.whatsapp{
  position:fixed;
  left:16px;right:16px;bottom:16px;
  max-width:528px;
  margin:0 auto;
  background:var(--green);
  color:#fff;
  padding:17px;
  border-radius:var(--radius-md);
  text-align:center;
  font-weight:800;
  letter-spacing:.3px;
  text-decoration:none;
  display:block;
  box-shadow:0 8px 20px rgba(37,211,102,.35);
  transition:transform .15s ease, box-shadow .15s ease;
  animation:fadeInUp .5s ease both;
  animation-delay:.15s;
}
.whatsapp:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(37,211,102,.45);}
.whatsapp:active{transform:translateY(0) scale(.98);}

/* ── JOIN-CHANNEL POPUP (first visit, mandatory until dismissed) ── */
.modal-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(15,15,25,.55);
  backdrop-filter:blur(3px);
  align-items:center;
  justify-content:center;
  z-index:1000;
  padding:20px;
}
.modal-card{
  background:var(--surface);
  border-radius:var(--radius-lg);
  padding:30px 24px 24px;
  max-width:360px;
  width:100%;
  max-height:90vh;
  overflow-y:auto;
  text-align:center;
  box-shadow:0 20px 50px rgba(0,0,0,.25);
  animation:modalPop .35s ease both;
}
.modal-title{
  font-size:24px;
  font-weight:900;
  color:var(--blue);
  letter-spacing:-.3px;
  margin-bottom:14px;
}
.modal-desc{
  font-size:13.5px;
  line-height:1.55;
  color:var(--text-secondary);
  font-weight:600;
  margin-bottom:10px;
}
.modal-warning{
  font-size:12.5px;
  line-height:1.5;
  color:var(--pink);
  font-weight:700;
  margin-bottom:22px;
}
.modal-btn{
  display:block;
  width:100%;
  padding:14px;
  border-radius:14px;
  border:none;
  font-size:14px;
  font-weight:800;
  letter-spacing:.02em;
  text-decoration:none;
  cursor:pointer;
  margin-bottom:10px;
  transition:transform .15s ease, box-shadow .15s ease, opacity .15s ease;
}
.modal-btn:last-child{margin-bottom:0;}
.modal-btn:hover{transform:translateY(-2px);opacity:.94;}
.modal-btn:active{transform:translateY(0) scale(.97);}
.modal-btn-primary{
  background:var(--green);
  color:#fff;
  box-shadow:0 8px 18px rgba(37,211,102,.35);
}
.modal-btn-secondary{
  background:var(--surface-alt);
  color:var(--text-dark);
}

/* ── ANIMATIONS ── */
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeInDown{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
@keyframes modalPop{from{opacity:0;transform:scale(.92) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}
.fade-in{animation:fadeInUp .35s ease both;}

/* ── FOCUS / A11Y ── */
.folder:focus-visible,.lec-btn:focus-visible,.search-input:focus-visible,.back-btn:focus-visible,.whatsapp:focus-visible,.modal-btn:focus-visible,.contact-admin-btn:focus-visible,.theme-toggle-btn:focus-visible,.search-clear-btn:focus-visible,.state-retry-btn:focus-visible{
  outline:3px solid var(--blue);
  outline-offset:2px;
}

@media (max-width:380px){
  .lec-btn{font-size:12px;padding:11px 6px;}
}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{
    animation-duration:.001ms !important;
    animation-iteration-count:1 !important;
    transition-duration:.001ms !important;
  }
}

/* ── SCROLL TO TOP BUTTON ── */
#scrollTopBtn{
  display:none;
  position:fixed;
  bottom:80px;right:16px;
  width:44px;height:44px;
  border-radius:50%;
  border:none;
  background:var(--blue);
  color:#fff;
  font-size:20px;
  align-items:center;justify-content:center;
  box-shadow:var(--shadow-hover);
  cursor:pointer;
  z-index:400;
  transition:transform .15s ease,opacity .25s ease;
}
#scrollTopBtn.visible{display:flex;}
#scrollTopBtn:hover{transform:translateY(-2px);}
#scrollTopBtn:active{transform:scale(.93);}

/* ── NEW BADGE ── */
.new-badge{
  background:var(--pink);
  color:#fff;
  font-size:10px;
  font-weight:800;
  padding:2px 7px;
  border-radius:999px;
  letter-spacing:.04em;
  flex-shrink:0;
}

/* ── LEVEL TRANSITION ── */
.level-enter{
  animation:levelIn .22s ease both;
}
.level-exit{
  animation:levelOut .18s ease both;
}
@keyframes levelIn{from{opacity:0;transform:translateX(18px);}to{opacity:1;transform:translateX(0);}}
@keyframes levelOut{from{opacity:1;transform:translateX(0);}to{opacity:0;transform:translateX(-18px);}}

/* ── RECENTLY VIEWED CHIPS ── */
.recently-section{margin-bottom:18px;}
.recently-label{font-size:12px;font-weight:800;letter-spacing:1.5px;color:var(--text-muted);margin-bottom:8px;text-transform:uppercase;}
.recently-chips{display:flex;flex-wrap:wrap;gap:7px;}
.recently-chip{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--surface);
  color:var(--blue);
  font-size:12px;font-weight:700;
  padding:7px 12px;
  border-radius:999px;
  box-shadow:var(--shadow-soft);
  cursor:pointer;
  border:none;
  transition:transform .15s ease,box-shadow .15s ease;
  max-width:180px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.recently-chip:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover);}
.recently-chip:active{transform:scale(.96);}

/* ── TRENDING SECTION ── */
.trending-section{margin-bottom:18px;}
.trending-label{font-size:12px;font-weight:800;letter-spacing:1.5px;color:var(--text-muted);margin-bottom:8px;text-transform:uppercase;}
.trending-chips{display:flex;flex-wrap:wrap;gap:7px;}
.trending-chip{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--surface);
  color:var(--text-dark);
  font-size:12px;font-weight:700;
  padding:7px 12px;
  border-radius:999px;
  box-shadow:var(--shadow-soft);
  cursor:pointer;
  border:none;
  transition:transform .15s ease,box-shadow .15s ease;
  max-width:180px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.trending-chip:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover);}
.trending-chip:active{transform:scale(.96);}

/* ── BREADCRUMB CLICKABLE ── */
.crumb-part{
  color:var(--blue);cursor:pointer;font-weight:700;
  text-decoration:underline;text-underline-offset:2px;
  font-size:13px;
}
.crumb-part:hover{opacity:.8;}
.crumb-sep{color:var(--text-muted);margin:0 3px;font-size:12px;}
.crumb-current{color:var(--text-secondary);font-size:13px;font-weight:700;}

/* ── ARIA LIVE (visually hidden) ── */
.sr-only{
  position:absolute;width:1px;height:1px;padding:0;margin:-1px;
  overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;
}
</style>

<button type="button" id="scrollTopBtn" aria-label="Scroll to top">⬆</button>
<div id="srAnnounce" class="sr-only" aria-live="polite" aria-atomic="true"></div>

<div id="joinModalOverlay" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="joinModalTitle">
  <div class="modal-card">

<script>

// ─── Browser/hardware back-button sync ─────────────────────────────────────
// Every in-app "drill into a folder" push a history entry, so the device's
// own back gesture/button steps back through folder levels one at a time
// instead of immediately leaving the page. Scroll restoration is handled
// ourselves (see scrollPositions below), not by the browser, since the
// page's content (and height) changes between levels.
if ("scrollRestoration" in history) history.scrollRestoration = "manual";

function pathKey(p) {
  return p.map(x => x.name).join(">");
}

// Remembers each level's scroll position, keyed by the path you were AT
// when you left it — so going back restores exactly where you were,
// while drilling into something new always starts at the top.
const scrollPositions = {};

function setPath(newPath) {
  scrollPositions[pathKey(path)] = window.scrollY;
  path = newPath;
}

function applyScrollForCurrentPath() {
  const saved = scrollPositions[pathKey(path)];
  requestAnimationFrame(() => {
    window.scrollTo(0, typeof saved === "number" ? saved : 0);
  });
}

function pushHistoryState() {
  const names = path.map(p => p.name);
  const hash = names.length ? "#" + names.map(n => encodeURIComponent(n)).join("/") : location.pathname + location.search;
  history.pushState({ names }, "", names.length ? "#" + names.map(n => encodeURIComponent(n)).join("/") : location.pathname + location.search);
}

// Walks rootData.folders following a list of names (as stored in a history
// entry) and returns the resolved path array, or null if it no longer
// resolves (e.g. that folder was renamed/removed since this tab was opened).
function resolveNodeByNames(names) {
  let list = rootData ? rootData.folders : [];
  const resolved = [];
  for (const name of names) {
    const found = list.find(f => f.name === name);
    if (!found) return null;
    resolved.push(found);
    list = found.children || [];
  }
  return resolved;
}

window.addEventListener("popstate", (e) => {
  if (!rootData) return;
  scrollPositions[pathKey(path)] = window.scrollY;
  const names = (e.state && e.state.names) || parseHashPath();
  path = resolveNodeByNames(names) || [];
  if (searchInput.value) {
    searchInput.value = "";
    updateSearchClearVisibility();
  }
  renderCurrentLevel();
  applyScrollForCurrentPath();
});

// ─── Recently Viewed (visitor-side) ──────────────────────────────────────────
function getRecentlyViewed() {

}
function saveRecentlyViewed(list) {

}
function recordRecentlyViewed(folderPath) {
  if (!folderPath || folderPath.length === 0) return;
  const key = folderPath.map(f => f.name).join(">");
  let list = getRecentlyViewed();
  list = list.filter(item => item.key !== key);
  list.unshift({ key, names: folderPath.map(f => f.name), label: folderPath[folderPath.length - 1].name });
  if (list.length > RECENTLY_MAX) list.length = RECENTLY_MAX;
  saveRecentlyViewed(list);
}

// ─── Trending / open counts ───────────────────────────────────────────────────
function getOpenCounts() {
  try { return JSON.parse(localStorage.getItem(TRENDING_KEY) || "{}"); } catch(e) { return {}; }
}
function incrementOpenCount(folderPath) {
  if (!folderPath || folderPath.length === 0) return;
  const key = folderPath.map(f => f.name).join(">");
  let counts = getOpenCounts();
  counts[key] = (counts[key] || 0) + 1;
  try { localStorage.setItem(TRENDING_KEY, JSON.stringify(counts)); } catch(e) {}
}
function getTopFolders() {
  const counts = getOpenCounts();
  return Object.entries(counts)
    .sort((a, b) => b[1] - a[1])
    .slice(0, TRENDING_TOP)
    .map(([key]) => key);
}

        const topFolder = rootData.folders.find(f => f.name === names[0]);

alreadyJoinedBtn.addEventListener("click", () => {

// "buttons" is the current field name. "links" is kept as a fallback in
// case data.json hasn't gone through the bot's /migrate step yet.
// (Not to be confused with the singular "link" field below, which is a
// folder-level direct-shortcut URL, not a list of buttons.)
function getButtons(folder) {
  return folder.buttons || folder.links || [];
}

// A folder counts as a "direct link" only if its "link" field is present
// AND not just whitespace — matches the admin bot's /setlink / /removelink.
function hasDirectLink(folder) {
  return !!(folder && folder.link && String(folder.link).trim().length > 0);
}

function normalizeUrl(url) {
  if (!url) return "#";
  const trimmed = String(url).trim();
  if (/^https?:\/\//i.test(trimmed)) return trimmed;
  return "https://" + trimmed;
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// ─── Lazy-loaded folder chunks (performance) ───────────────────────────────
// On a fresh visit we fetch only "shell.json" — every top-level folder, but
// with each one's full subtree stripped out and replaced by a "_chunk"
// pointer (plus "_count" so the badge still shows the right number). The
// real subtree is fetched from that chunk file only once the visitor
// actually opens that folder. If shell.json isn't available for any reason
// (older publish, network hiccup, etc.) we fall back to fetching the
// original full data.json, so the site always keeps working either way.
function folderChildCount(folder) {
  if (folder._chunk && !folder._loaded && typeof folder._count === "number") return folder._count;
  return folder.children ? folder.children.length : 0;
}

async function loadChunkFor(folder) {
  if (!folder._chunk || folder._loaded) return true;
  try {
    const res = await fetch(folder._chunk, { cache: "no-store" });
    if (!res.ok) throw new Error("chunk fetch failed");
    const payload = await res.json();
    folder.children = (payload && payload.children) || [];
    folder._loaded = true;
    return true;
  } catch (err) {
    return false; // leave _loaded unset so a retry can try again
  }
}

// Fetches every not-yet-loaded chunk in parallel — needed before a search,
// since search has to look through the whole tree, not just what's been
// opened so far. Best-effort: a folder whose chunk fails to load is simply
// skipped in search results rather than blocking the rest.
async function ensureFullTreeLoaded() {
  if (!lazyMode || !rootData) return;
  const pending = rootData.folders.filter(f => f._chunk && !f._loaded);
  if (pending.length === 0) return;
  await Promise.all(pending.map(loadChunkFor));
}

function renderSkeleton() {
  foldersEl.innerHTML = `
    <div class="skeleton-card"></div>
    <div class="skeleton-card"></div>
    <div class="skeleton-card"></div>
  `;
}

// Buttons have no separate "type" in the data — the bot only stores
// {title, url}. So the color + icon are detected from the title text
// itself. Add a new button with any of these words in its label
// (case-insensitive) and it picks up the matching look automatically;
// anything else falls back to the orange "extra" style.
const BUTTON_TYPES = [
  { test: t => t.includes("hindi"),                                            cls: "btn-hindi", icon: "📘" },
  { test: t => t.includes("eng"),                                              cls: "btn-eng",   icon: "📄" },
  { test: t => t.includes("video") || t.includes("lecture"),                   cls: "btn-video", icon: "▶" },
  { test: t => t.includes("quiz") || t.includes("test") || t.includes("mock"), cls: "btn-quiz",  icon: "❓" },
  { test: t => t.includes("pdf") || t.includes("ppt") || t.includes("note"),   cls: "btn-pdf",   icon: "📝" },
];

function detectButtonType(button) {
  // Explicit icon_type field set by /seticontype overrides keyword auto-detection
  if (button && button.icon_type) {
    const override = BUTTON_TYPES.find(e => e.cls === "btn-" + button.icon_type);
    if (override) return override;
  }
  const t = String(button && button.title ? button.title : button).toLowerCase();
  for (const entry of BUTTON_TYPES) {
    if (entry.test(t)) return entry;
  }
  return { cls: "btn-extra", icon: "🔗" };
}

function isNewFolder(folder) {
  const t = folder && folder.created_at ? Date.parse(folder.created_at) : NaN;
  if (isNaN(t)) return false;
  return (Date.now() - t) < NEW_BADGE_DAYS * 86400000;
}

function createFolderCard(folder, index, opts = {}) {
  const div = document.createElement("div");
  div.className = "folder fade-in";
  div.style.animationDelay = (index * 0.05) + "s";
  div.tabIndex = 0;
  div.setAttribute("role", "button");

  const count = folderChildCount(folder) + getButtons(folder).length;
  const badge = count > 0 ? `<span class="count-badge">${count}</span>` : "";
  const newBadge = isNewFolder(folder) ? `<span class="new-badge">🆕 NEW</span>` : "";
  const subtext = opts.subtext ? `<div class="crumb-sub">${escapeHtml(opts.subtext)}</div>` : "";

  div.innerHTML = `
    <div class="folder-main">
      <div class="folder-name">📁 ${escapeHtml(folder.name)}</div>
      ${subtext}
    </div>
    <div class="folder-right">${newBadge}${badge}<span class="arrow">➜</span></div>
  `;

  const activate = opts.onClick || (() => handleFolderClick(folder));
  div.onclick = activate;
  div.onkeydown = (e) => {
    if (e.key === "Enter" || e.key === " ") {
      e.preventDefault();
      activate();
    }
  };
  return div;
}

// opts.subtext + opts.full → used for search-result rows (full width, breadcrumb shown)
// otherwise → a grid pill (used for normal folder browsing)
function createButtonCard(button, opts = {}) {
  const a = document.createElement("a");
  const type = detectButtonType(button);
  const isSearchRow = !!opts.subtext;

  a.className = "lec-btn fade-in " + type.cls + (isSearchRow ? " with-sub" : "") + (opts.full ? " full" : "");
  a.style.animationDelay = ((opts.index || 0) * 0.04) + "s";
  a.href = normalizeUrl(button.url);
  a.target = "_blank";
  a.rel = "noopener noreferrer";

  if (isSearchRow) {
    a.innerHTML = `
      <span class="btn-icon">${type.icon}</span>
      <span class="btn-text">
        <span class="btn-label">${escapeHtml(button.title)}</span>
        <span class="btn-sub">${escapeHtml(opts.subtext)}</span>
      </span>
    `;
  } else {
    a.innerHTML = `<span class="btn-icon">${type.icon}</span><span>${escapeHtml(button.title)}</span>`;
  }
  return a;
}

function buildButtonsGrid(buttons) {
  const grid = document.createElement("div");
  grid.className = "btn-grid";
  buttons.forEach((btn, i) => {
    const card = createButtonCard(btn, { index: i });
    if (buttons.length % 2 !== 0 && i === buttons.length - 1) card.classList.add("full");
    grid.appendChild(card);
  });
  return grid;
}

// A leaf folder (no subfolders, no direct link) is shown as a single card:
// its name as a heading, its buttons directly below — no click/navigation
// needed to see them. Direct-link folders never reach this function (see
// renderLevel's filtering below), so "No buttons yet" never shows for them.
function createLectureCard(folder, index) {

  card.style.animationDelay = (index * 0.05) + "s";

  const title = document.createElement("div");

  card.appendChild(title);

  const buttons = getButtons(folder);
  if (buttons.length > 0) {
    card.appendChild(buildButtonsGrid(buttons));
  } else {
    const empty = document.createElement("div");
    empty.className = "crumb-sub";
    empty.innerText = "No buttons yet";
    card.appendChild(empty);
  }
  return card;
}

// Used for folders that contain subfolders — clicking drills into them.
// Defensive guard: direct-link folders are normally routed straight to
// createDirectLinkCard by renderLevel/renderSearchResults and never call
// this at all, but if one ever does reach here, open its link instead of
// navigating into it, so direct-link behaviour always wins.
async function handleFolderClick(folder) {
  if (hasDirectLink(folder)) {
    window.open(normalizeUrl(folder.link), "_blank", "noopener,noreferrer");
    return;
  }

  if (folder._chunk && !folder._loaded) {
    renderSkeleton();
    const ok = await loadChunkFor(folder);
    if (!ok) {
      foldersEl.innerHTML = `
        <div class="error-state">
          <div class="state-icon">📡</div>
          <div class="state-title">Couldn't load this folder</div>
          <div class="state-sub">Check your connection and try again.</div>
          <button type="button" class="state-retry-btn" id="folderRetryBtn">Retry</button>
        </div>`;
      const retryBtn = document.getElementById("folderRetryBtn");
      if (retryBtn) retryBtn.onclick = () => handleFolderClick(folder);
      return;
    }
  }

  setPath([...path, folder]);
  pushHistoryState();
  recordRecentlyViewed(path);  // record the path AFTER setPath updates it
  incrementOpenCount(path);
  // Fire-and-forget analytics ping (privacy-friendly: just folder path, no user data)
  try {
    fetch("/ping", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ path: path.map(f => f.name).join(" > ") }),
      keepalive: true,
    }).catch(() => {});
  } catch(e) {}
  renderLevel(folder.children || [], getButtons(folder), folder);
  updateBreadcrumb();
  applyScrollForCurrentPath();
}

// A folder with its own "link" field set acts as a pure shortcut — tapping
// it opens that link directly via window.open, skipping both navigation
// and the button grid entirely.
function createDirectLinkCard(folder, index, opts = {}) {
  const div = document.createElement("div");
  div.className = "folder fade-in";
  div.style.animationDelay = (index * 0.05) + "s";
  div.tabIndex = 0;
  div.setAttribute("role", "link");

  const subtext = opts.subtext ? `<div class="crumb-sub">${escapeHtml(opts.subtext)}</div>` : "";
  div.innerHTML = `
    <div class="folder-main">
      <div class="folder-name">🔗 ${escapeHtml(folder.name)}</div>
      ${subtext}
    </div>
    <div class="folder-right"><span class="link-badge">🔗 Direct Link</span><span class="arrow">➜</span></div>
  `;

  const activate = () => window.open(normalizeUrl(folder.link), "_blank", "noopener,noreferrer");
  div.onclick = activate;
  div.onkeydown = (e) => {
    if (e.key === "Enter" || e.key === " ") {
      e.preventDefault();
      activate();
    }
  };
  return div;
}

// Folders below the first 3 navigable levels (Home -> RANI MAM -> Achiever 8.0
// -> [Grammar, ...]) are auto-ordered by each folder's "created_at"
// timestamp. Home, and the first two levels under it, keep their existing
// manual/stored order untouched — this is driven by "path.length" (how deep
// we currently are) at the moment a level is rendered, so it applies
// recursively to every deeper level for free. Buttons are NEVER reordered —
// only the folders array is affected.
const NEWEST_FIRST_FROM_DEPTH = 3;

// Each folder remembers its OWN toggle state independently — flipping the
// order while looking at Grammar's children only affects Grammar; every
// other folder keeps showing newest-first until you toggle it separately.
// Keyed by the folder's full path (names are unique among siblings, so this
// is a stable key). Resets on page reload.
//
// Default precedence for a level that hasn't been manually toggled this
// session: the folder's own "sort_order" field (set via the admin bot's
// /setsort or /panel → Sort Order) if present, otherwise "newest" — same
// as before this field existed.
let sortOrders = {};

function currentLevelKey() {
  return pathKey(path);
}

function getSortOrder(key, node) {
  if (Object.prototype.hasOwnProperty.call(sortOrders, key)) return sortOrders[key];
  if (node && (node.sort_order === "newest" || node.sort_order === "oldest")) return node.sort_order;
  return "newest";
}

function getCreatedAtMs(folder) {
  const t = folder && folder.created_at ? Date.parse(folder.created_at) : NaN;
  return isNaN(t) ? 0 : t; // folders with no/invalid timestamp sort to the end
}

function sortByCreated(arr, order) {
  const oldestFirst = arr.slice().sort((a, b) => getCreatedAtMs(a) - getCreatedAtMs(b));
  return order === "newest" ? oldestFirst.reverse() : oldestFirst;
}

function toggleSortOrder(key, node) {
  sortOrders[key] = getSortOrder(key, node) === "newest" ? "oldest" : "newest";
  renderCurrentLevel();
}

function createSortToggle(key, node) {
  const row = document.createElement("div");
  row.className = "sort-toggle-row";

  const order = getSortOrder(key, node);
  const btn = document.createElement("button");
  btn.type = "button";
  btn.className = "sort-toggle-btn";
  btn.innerHTML = order === "newest"
    ? '<span class="sort-toggle-icon">🆕</span> Newest First'
    : '<span class="sort-toggle-icon">⏳</span> Oldest First';
  btn.onclick = () => toggleSortOrder(key, node);

  row.appendChild(btn);
  return row;
}

function renderLevel(folders, buttons, currentNode, opts = {}) {
  // Smooth level transition
  if (!opts.skipTransition) {
    foldersEl.classList.add("level-enter");
    foldersEl.addEventListener("animationend", () => foldersEl.classList.remove("level-enter"), { once: true });
  }
  foldersEl.innerHTML = "";

  const direct    = folders.filter(f => hasDirectLink(f));
  const navigable = folders.filter(
  f => !hasDirectLink(f) &&
  ((f.children && f.children.length > 0) || f._chunk)
);
  const leaves = folders.filter(
  f => !hasDirectLink(f) &&
  !((f.children && f.children.length > 0) || f._chunk)
);

  const applySort = path.length >= NEWEST_FIRST_FROM_DEPTH;
  const levelKey  = applySort ? currentLevelKey() : null;
  const order     = applySort ? getSortOrder(levelKey, currentNode) : null;

  if (applySort && folders.length > 0) {
    foldersEl.appendChild(createSortToggle(levelKey, currentNode));
  }

  const orderedDirect    = applySort ? sortByCreated(direct, order)    : direct;
  const orderedNavigable = applySort ? sortByCreated(navigable, order) : navigable;
  const orderedLeaves    = applySort ? sortByCreated(leaves, order)    : leaves;

  orderedDirect.forEach((folder, i) => foldersEl.appendChild(createDirectLinkCard(folder, i)));
  orderedNavigable.forEach((folder, i) => foldersEl.appendChild(createFolderCard(folder, orderedDirect.length + i)));
  orderedLeaves.forEach((folder, i) => foldersEl.appendChild(createLectureCard(folder, orderedDirect.length + orderedNavigable.length + i)));

  if (buttons && buttons.length > 0) {
    if (folders.length > 0) {
      const label = document.createElement("div");
      label.className = "links-label";
      label.innerText = "Buttons";
      foldersEl.appendChild(label);
    }
    foldersEl.appendChild(buildButtonsGrid(buttons));
  }

  if (folders.length === 0 && (!buttons || buttons.length === 0)) {
    foldersEl.innerHTML = `
      <div class="empty-state">
        <div class="state-icon">📂</div>
        <div class="state-title">Nothing here yet</div>
        <div class="state-sub">This folder is empty for now — check back later.</div>
      </div>`;
  }

  backBtn.style.display = path.length ? "inline-flex" : "none";
}

function renderCurrentLevel() {
  if (path.length === 0) {
    renderLevel(rootData.folders, [], null);
    breadcrumbEl.innerHTML = `<span class="crumb-current">Home</span>`;
    renderHomeExtras();
  } else {
    recentlySection.style.display = "none";
    trendingSection.style.display = "none";
    const last = path[path.length - 1];
    renderLevel(last.children || [], getButtons(last), last);
    updateBreadcrumb();
  }
}

function updateBreadcrumb() {
  const parts = [];

  // Home segment
  const homeSpan = document.createElement("span");
  homeSpan.className = "crumb-part";
  homeSpan.textContent = "Home";
  homeSpan.onclick = () => {
    setPath([]);
    pushHistoryState();
    searchInput.value = "";
    updateSearchClearVisibility();
    renderCurrentLevel();
    applyScrollForCurrentPath();
  };

  let html = `<span class="crumb-part" onclick="(function(){setPath([]);pushHistoryState();searchInput.value='';updateSearchClearVisibility();renderCurrentLevel();applyScrollForCurrentPath();})()">Home</span>`;

  path.forEach((item, idx) => {
    html += `<span class="crumb-sep">›</span>`;
    if (idx < path.length - 1) {
      html += `<span class="crumb-part" data-idx="${idx}">${escapeHtml(item.name)}</span>`;
    } else {
      html += `<span class="crumb-current">${escapeHtml(item.name)}</span>`;
    }
  });

  breadcrumbEl.innerHTML = html;

  // Attach click handlers for intermediate segments
  breadcrumbEl.querySelectorAll(".crumb-part[data-idx]").forEach(el => {
    const idx = parseInt(el.getAttribute("data-idx"));
    el.onclick = async () => {
      const targetPath = path.slice(0, idx + 1);
      // ensure chunk loaded for target
      const topFolder = targetPath[0];
      if (topFolder && topFolder._chunk && !topFolder._loaded) {
        await loadChunkFor(topFolder);
      }
      setPath(targetPath);
      pushHistoryState();
      searchInput.value = "";
      updateSearchClearVisibility();
      const last = targetPath[targetPath.length - 1];
      renderLevel(last.children || [], getButtons(last), last);
      updateBreadcrumb();
      applyScrollForCurrentPath();
    };
  });
}

function searchTree(folders, query, ancestors = []) {
  let results = [];
  folders.forEach(folder => {
    const folderMatches = folder.name.toLowerCase().includes(query);
    if (folderMatches) {
      results.push({ type: "folder", target: folder, ancestors });
    }
    // Buttons inside a direct-link folder aren't reachable through normal
    // browsing (the folder jumps straight to its link instead of showing
    // a button grid), so skip indexing them here too — keeps search
    // results consistent with what's actually visible when browsing.
    if (!folderMatches && !hasDirectLink(folder)) {
      getButtons(folder).forEach(btn => {
        if (btn.title.toLowerCase().includes(query)) {
          results.push({ type: "button", target: btn, ancestors: [...ancestors, folder] });
        }
      });
    }
    if (!folderMatches && folder.children && folder.children.length) {
      results = results.concat(searchTree(folder.children, query, [...ancestors, folder]));
    }
  });
  return results;
}

function renderSearchResults(results, query) {
  foldersEl.innerHTML = "";
  breadcrumbEl.innerHTML = `<span class="crumb-current">Search results for "${escapeHtml(query)}"</span>`;
  backBtn.style.display = "none";

  // Announce result count to screen readers
  srAnnounce.textContent = results.length === 0
    ? `No results found for ${query}`
    : `${results.length} result${results.length !== 1 ? "s" : ""} found`;

  if (results.length === 0) {
    foldersEl.innerHTML = `
      <div class="empty-state">
        <div class="state-icon">🔍</div>
        <div class="state-title">No matches found</div>
        <div class="state-sub">Try a different keyword for "${escapeHtml(query)}".</div>
      </div>`;
    return;
  }

  results.forEach((r, i) => {
    const crumb = "Home" + (r.ancestors.length ? " > " + r.ancestors.map(a => a.name).join(" > ") : "");
    if (r.type === "folder") {
      if (hasDirectLink(r.target)) {

    foldersEl.appendChild(
        createDirectLinkCard(r.target, i, { subtext: crumb })
    );

} else if (r.target.children && r.target.children.length > 0) {

    foldersEl.appendChild(
        createFolderCard(r.target, i, {
            subtext: crumb,
            onClick: () => {
                setPath([...r.ancestors, r.target]);
                pushHistoryState();
                searchInput.value = "";
                updateSearchClearVisibility();
                renderLevel(r.target.children || [], getButtons(r.target), r.target);
                updateBreadcrumb();
                applyScrollForCurrentPath();
            }
        })
    );

} else {

    foldersEl.appendChild(
        createLectureCard(r.target, i, {
            subtext: crumb
        })
    );

}
    } else {
      foldersEl.appendChild(createButtonCard(r.target, { index: i, subtext: crumb, full: true }));
    }
  });
}

function updateSearchClearVisibility() {
  searchClearBtn.style.display = searchInput.value ? "flex" : "none";
}

let searchDebounceTimer = null;

searchInput.addEventListener("input", () => {
  updateSearchClearVisibility();
  clearTimeout(searchDebounceTimer);
  searchDebounceTimer = setTimeout(async () => {
    const myGen = ++searchGeneration;
    const raw = searchInput.value.trim();
    const q = raw.toLowerCase();
    if (!rootData) {
      foldersEl.innerHTML = `
        <div class="error-state">
          <div class="state-icon">⚠️</div>
          <div class="state-title">Couldn't load content</div>
          <div class="state-sub">Please check your connection and reload the page.</div>
        </div>`;
      return;
    }
    if (!q) {
      renderCurrentLevel();
      return;
    }
    if (lazyMode) {
      renderSkeleton();
      await ensureFullTreeLoaded();
      if (myGen !== searchGeneration) return;
    }
    renderSearchResults(searchTree(rootData.folders, q), raw);
  }, 180);
});

searchClearBtn.addEventListener("click", () => {
  searchInput.value = "";
  updateSearchClearVisibility();
  renderCurrentLevel();
  searchInput.focus();
});

function parseHashPath() {
  const hash = location.hash;
  if (!hash || hash === "#") return [];
  try {
    return hash.slice(1).split("/").map(s => decodeURIComponent(s)).filter(Boolean);
  } catch(e) { return []; }
}

async function loadData() {
  // The initial skeleton cards already in the HTML cover this fetch, so the
  // page is never blank while we wait on the network.
  try {
    const shellRes = await fetch("shell.json", { cache: "no-store" });
    if (!shellRes.ok) throw new Error("no shell.json");
    rootData = await shellRes.json();
    if (!rootData.folders) rootData.folders = [];
    lazyMode = true;
  } catch (err) {
    // Fallback: the original full-tree file. Covers a fresh deploy before
    // the next /publish has generated shell.json/chunks yet, or any other
    // reason the lazy files aren't reachable — the site still works either
    // way, it just downloads everything up front like before.
    try {
      const res = await fetch("data.json");
      if (!res.ok) throw new Error("Network response was not ok");
      rootData = await res.json();
      if (!rootData.folders) rootData.folders = [];
      lazyMode = false;
    } catch (err2) {
      foldersEl.innerHTML = `
        <div class="error-state">
          <div class="state-icon">⚠️</div>
          <div class="state-title">Couldn't load content</div>
          <div class="state-sub">Please check your connection and reload the page.</div>
        </div>`;
      backBtn.style.display = "none";
      return;
    }
  }
  history.replaceState({ names: [] }, "", location.href);

  // ── Deep-link: if a #hash is present, resolve it to a folder path ──────────
  const hashNames = parseHashPath();
  if (hashNames.length > 0) {
    // Try to load the needed chunk for the top-level folder, then navigate
    const topFolder = rootData.folders.find(f => f.name === hashNames[0]);
    if (topFolder && topFolder._chunk && !topFolder._loaded) {
      await loadChunkFor(topFolder);
    }
    const resolved = resolveNodeByNames(hashNames);
    if (resolved && resolved.length > 0) {
      path = resolved;
      history.replaceState({ names: hashNames }, "", location.href);
      const last = resolved[resolved.length - 1];
      renderLevel(last.children || [], getButtons(last), last);
      updateBreadcrumb();
      return;
    }
  }

  renderCurrentLevel();
}

loadData();

// ─── Service Worker registration (PWA) ────────────────────────────────────────
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js").catch(() => {});
  });
}
</script>
