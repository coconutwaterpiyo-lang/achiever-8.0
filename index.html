<script>
let rootData = null;
let path = [];

async function loadData() {
    try {
        const res = await fetch("data.json");
        if (!res.ok) throw new Error("Data not found");
        rootData = await res.json();
        renderFolders(rootData.folders);
    } catch (e) {
        document.body.innerHTML = "<h2 style='text-align:center; margin-top:50px;'>Error: data.json load nahi hua!</h2>";
    }
}

// Ye function decide karega ki link kholna hai ya folder ke andar jana hai
function handleFolderClick(folder) {
    const isShortcut = (!folder.children || folder.children.length === 0) && 
                       (folder.links && folder.links.length === 1);

    if (isShortcut) {
        window.open(folder.links[0].url, '_blank');
    } else {
        path.push(folder);
        renderContent(folder.children || [], folder.links || []);
        updateBreadcrumb();
    }
}

function renderFolders(folders) {
    const container = document.getElementById("folders");
    container.innerHTML = "";
    folders.forEach(folder => {
        const div = document.createElement("div");
        div.className = "folder";
        div.innerHTML = `<div class="folder-name">📁 ${folder.name}</div><div class="arrow">➜</div>`;
        div.onclick = () => handleFolderClick(folder);
        container.appendChild(div);
    });
    document.getElementById("backBtn").style.display = path.length ? "block" : "none";
}

function renderContent(folders, links) {
    const container = document.getElementById("folders");
    container.innerHTML = "";
    folders.forEach(folder => {
        const div = document.createElement("div");
        div.className = "folder";
        div.innerHTML = `<div class="folder-name">📁 ${folder.name}</div><div class="arrow">➜</div>`;
        div.onclick = () => handleFolderClick(folder);
        container.appendChild(div);
    });

    if (links && links.length > 0) {
        const section = document.createElement("div");
        section.className = "links-section";
        links.forEach(link => {
            const a = document.createElement("a");
            a.className = "link-card";
            a.href = link.url;
            a.target = "_blank";
            a.innerHTML = `<div class="link-title">🔗 ${link.title}</div><div class="link-arrow">➜</div>`;
            section.appendChild(a);
        });
        container.appendChild(section);
    }
    document.getElementById("backBtn").style.display = path.length ? "block" : "none";
}

function updateBreadcrumb() {
    document.getElementById("breadcrumb").innerText = "Home" + path.map(p => " > " + p.name).join("");
}

document.getElementById("backBtn").onclick = () => {
    path.pop();
    if (path.length === 0) renderFolders(rootData.folders);
    else renderContent(path[path.length-1].children, path[path.length-1].links);
    updateBreadcrumb();
};

loadData();
</script>
