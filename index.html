<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACHIEVER 8.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:linear-gradient(135deg,#eef5ff,#fff0f8);min-height:100vh;padding:20px;}
.header{text-align:center;margin:25px 0;}
.logo{font-size:40px;font-weight:900;color:#2563eb;}
.logo span{color:#ec4899;}
.subtitle{margin-top:10px;font-size:14px;font-weight:700;letter-spacing:2px;color:#2563eb;}
#breadcrumb{margin:15px 0;font-size:14px;font-weight:bold;color:#666;}
.folder{background:#fff;border-radius:24px;padding:22px;margin-bottom:15px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 12px rgba(0,0,0,.08);cursor:pointer;}
.folder-name{font-size:18px;font-weight:700;}
.arrow{font-size:24px;color:#2563eb;}
.back-btn{background:#2563eb;color:white;border:none;padding:10px 16px;border-radius:10px;margin-bottom:15px;cursor:pointer;display:none;}
.links-section{margin-top:10px;}
.links-label{font-size:13px;font-weight:700;letter-spacing:1px;color:#888;margin-bottom:10px;text-transform:uppercase;}
.link-card{background:#fff;border-radius:18px;padding:18px 22px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 12px rgba(0,0,0,.08);cursor:pointer;text-decoration:none;transition:transform 0.15s ease, box-shadow 0.15s ease;}
.link-card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.13);}
.link-title{font-size:16px;font-weight:700;color:#1e1e1e;}
.link-arrow{font-size:20px;color:#ec4899;}
.whatsapp{position:fixed;left:15px;right:15px;bottom:15px;background:#25D366;color:#fff;padding:18px;border-radius:18px;text-align:center;font-weight:700;text-decoration:none;}
</style>
</head>
<body>

<div class="header">
<div class="logo">ACHIEVER <span>8.0</span></div>
<div class="subtitle">BY RANI MAM • ENGLISH COMPLETE</div>
</div>

<div id="breadcrumb">Home</div>
<button class="back-btn" id="backBtn">⬅ Back</button>
<div id="folders"></div>

<a class="whatsapp" href="https://whatsapp.com/channel/0029Vb7n2ZBGE56cha5K7K3Z">JOIN WHATSAPP</a>

<script>
let rootData = null;
let currentFolder = null;
let path = [];

// "buttons" is the current field name. "links" is kept as a fallback in
// case data.json hasn't gone through the bot's /migrate step yet — the
// bot renames "links" to "buttons" the next time it saves, but the live
// JSON on GitHub/EdgeOne won't reflect that until then.
function getButtons(folder) {
    return folder.buttons || folder.links || [];
}

function handleFolderClick(folder) {
    const childCount = folder.children ? folder.children.length : 0;
    const buttons = getButtons(folder);

    // Exactly 1 button and 0 subfolders → skip the folder page, open it directly
    if (childCount === 0 && buttons.length === 1) {
        window.open(buttons[0].url, "_blank", "noopener,noreferrer");
        return;
    }

    if (childCount > 0 || buttons.length > 0) {
        path.push(folder);
        currentFolder = folder;
        renderContent(folder.children || [], buttons);
        updateBreadcrumb();
    }
}

async function loadData() {
    try {
        const res = await fetch("data.json?t=" + Date.now());

        rootData = await res.json();

        console.log("Loaded Data:", rootData);

        renderFolders(rootData.folders || []);
    } catch (e) {
        console.error(e);

        document.getElementById("folders").innerHTML =
            "<h3 style='color:red'>Error loading data.json</h3>";
    }
}

function renderFolders(folders) {
    const container = document.getElementById("folders");
    container.innerHTML = "";
    folders.forEach(folder => {
        const div = document.createElement("div");
        div.className = "folder";
        div.innerHTML = `<div class="folder-name">📁 ${folder.name}</div><div class="arrow">➜</div>`;
        div.onclick = () => handleFolderClick(folder);
        container.appendChild(div);
    });
    document.getElementById("backBtn").style.display = path.length ? "block" : "none";
}

function renderContent(folders, buttons) {
    const container = document.getElementById("folders");
    container.innerHTML = "";
    folders.forEach(folder => {
        const div = document.createElement("div");
        div.className = "folder";
        div.innerHTML = `<div class="folder-name">📁 ${folder.name}</div><div class="arrow">➜</div>`;
        div.onclick = () => handleFolderClick(folder);
        container.appendChild(div);
    });
    if (buttons && buttons.length > 0) {

    const section = document.createElement("div");
    section.className = "links-section";

    buttons.forEach(btn => {

        const a = document.createElement("a");

        let url = btn.url;

        if (
            !url.startsWith("http://") &&
            !url.startsWith("https://")
        ) {
            url = "https://" + url;
        }

        a.className = "link-card";
        a.href = url;
        a.target = "_blank";
        a.rel = "noopener noreferrer";

        a.innerHTML = '<div class="link-title">🔗 ' + btn.title + '</div><div class="link-arrow">➜</div>';

        section.appendChild(a);
    });

    container.appendChild(section);
}
    }
    document.getElementById("backBtn").style.display = path.length ? "block" : "none";
}

function updateBreadcrumb() {
    let text = "Home";
    path.forEach(item => { text += " > " + item.name; });
    document.getElementById("breadcrumb").innerText = text;
}

document.getElementById("backBtn").onclick = () => {
    path.pop();
    if (path.length === 0) {
        renderFolders(rootData.folders);
        document.getElementById("breadcrumb").innerText = "Home";
        return;
    }
    const last = path[path.length - 1];
    renderContent(last.children || [], getButtons(last));
    updateBreadcrumb();
};

loadData();
</script>
</body>
</html>
