<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACHIEVER 8.0</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#eef5ff,#fff0f8);
min-height:100vh;
padding:20px;
}

.header{
text-align:center;
margin:25px 0;
}

.logo{
font-size:40px;
font-weight:900;
color:#2563eb;
}

.logo span{
color:#ec4899;
}

.subtitle{
margin-top:10px;
font-size:14px;
font-weight:700;
letter-spacing:2px;
color:#2563eb;
}

#breadcrumb{
margin:15px 0;
font-size:14px;
font-weight:bold;
color:#666;
}

.folder{
background:#fff;
border-radius:24px;
padding:22px;
margin-bottom:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 4px 12px rgba(0,0,0,.08);
cursor:pointer;
}

.folder-name{
font-size:18px;
font-weight:700;
}

.arrow{
font-size:24px;
color:#2563eb;
}

.back-btn{
background:#2563eb;
color:white;
border:none;
padding:10px 16px;
border-radius:10px;
margin-bottom:15px;
cursor:pointer;
display:none;
}

.whatsapp{
position:fixed;
left:15px;
right:15px;
bottom:15px;
background:#25D366;
color:#fff;
padding:18px;
border-radius:18px;
text-align:center;
font-weight:700;
text-decoration:none;
}
</style>
</head>
<body>

<div class="header">
<div class="logo">ACHIEVER <span>8.0</span></div>
<div class="subtitle">BY RANI MAM • ENGLISH COMPLETE</div>
</div>

<div id="breadcrumb">Home</div>

<button class="back-btn" id="backBtn">⬅ Back</button>

<div id="folders"></div>

<a class="whatsapp"
href="https://whatsapp.com/channel/0029Vb7n2ZBGE56cha5K7K3Z">
JOIN WHATSAPP
</a>

<script>
let rootData = null;
let currentFolder = null;
let path = [];

async function loadData() {
    const res = await fetch("data.json");
    rootData = await res.json();

    renderFolders(rootData.folders);
}

function renderFolders(folders) {
    const container = document.getElementById("folders");
    container.innerHTML = "";

    folders.forEach(folder => {
        const div = document.createElement("div");
        div.className = "folder";

        div.innerHTML = `
            <div class="folder-name">📁 ${folder.name}</div>
            <div class="arrow">➜</div>
        `;

        div.onclick = () => {
            if(folder.children && folder.children.length > 0){
                path.push(folder);
                currentFolder = folder;
                renderFolders(folder.children);
                updateBreadcrumb();
            }
        };

        container.appendChild(div);
    });

    document.getElementById("backBtn").style.display =
        path.length ? "block" : "none";
}

function updateBreadcrumb() {
    let text = "Home";

    path.forEach(item => {
        text += " > " + item.name;
    });

    document.getElementById("breadcrumb").innerText = text;
}

document.getElementById("backBtn").onclick = () => {
    path.pop();

    if(path.length === 0){
        renderFolders(rootData.folders);
        document.getElementById("breadcrumb").innerText = "Home";
        return;
    }

    const last = path[path.length - 1];

    renderFolders(last.children);

    updateBreadcrumb();
};

loadData();
</script>

</body>
</html>
